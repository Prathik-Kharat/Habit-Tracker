<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Berkeley+Mono&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --surface2: #222226;
    --border: #2e2e33;
    --text: #e8e8e4;
    --muted: #6b6b72;
    --accent: #39d353;
    --accent2: #26a641;
    --accent3: #006d32;
    --accent4: #0e4429;
    --dim: #161b22;
    --sleep: #7c6af7;
    --coding: #39d353;
    --workout: #f97316;
    --study: #38bdf8;
    --mono: 'Berkeley Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 32px 20px 60px;
  }

  header {
    max-width: 860px;
    margin: 0 auto 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .title-block h1 {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--text);
  }

  .title-block p {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
    font-family: var(--mono);
  }

  .stat-pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: border-color 0.2s;
  }

  .pill span.val {
    color: var(--text);
    font-weight: 500;
  }

  .pill.streak-pill { border-color: var(--accent3); }
  .pill.streak-pill span.val { color: var(--accent); }

  /* ── TABS ── */
  .tabs {
    max-width: 860px;
    margin: 0 auto 24px;
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--border);
  }

  .tab {
    padding: 8px 18px;
    font-size: 13px;
    font-family: var(--mono);
    color: var(--muted);
    cursor: pointer;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }

  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  /* ── VIEWS ── */
  .view { display: none; max-width: 860px; margin: 0 auto; }
  .view.active { display: block; }

  /* ── TODAY CARD ── */
  .today-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }

  .today-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 16px;
  }

  .habit-rows { display: flex; flex-direction: column; gap: 10px; }

  .habit-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    user-select: none;
  }

  .habit-row:hover { border-color: #44444a; }
  .habit-row.done { border-color: #2a3d2e; background: #111c14; }

  .habit-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .habit-name {
    flex: 1;
    font-size: 14px;
    font-weight: 400;
  }

  .habit-row.done .habit-name { color: var(--muted); text-decoration: line-through; }

  .check-box {
    width: 20px; height: 20px;
    border: 1.5px solid var(--border);
    border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s, border-color 0.15s;
    font-size: 12px;
  }

  .habit-row.done .check-box {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  .progress-bar-wrap {
    height: 4px;
    background: var(--surface2);
    border-radius: 2px;
    margin-top: 16px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

  .progress-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 6px;
    text-align: right;
  }

  /* ── WEEKLY TABLE ── */
  .week-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  .week-table th {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }

  .week-table td {
    text-align: center;
    padding: 10px 6px;
    border-bottom: 1px solid #1c1c1f;
  }

  .week-table td.day-label {
    text-align: left;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    padding-left: 0;
    width: 80px;
  }

  .week-table tr.today-row td { background: #17191a; }
  .week-table tr.today-row td.day-label { color: var(--text); }

  .cell-dot {
    width: 18px; height: 18px;
    border-radius: 3px;
    margin: 0 auto;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: background 0.2s;
  }

  .cell-dot.done-sleep    { background: var(--sleep); border-color: var(--sleep); }
  .cell-dot.done-coding   { background: var(--coding); border-color: var(--coding); }
  .cell-dot.done-workout  { background: var(--workout); border-color: var(--workout); }
  .cell-dot.done-study    { background: var(--study); border-color: var(--study); }

  /* ── MONTHLY GRID ── */
  .month-section { margin-bottom: 32px; }

  .month-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .habit-grid-block { margin-bottom: 20px; }

  .habit-grid-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
  }

  .habit-grid-name {
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
  }

  .grid-row {
    display: flex;
    gap: 3px;
    flex-wrap: wrap;
  }

  .grid-cell {
    width: 14px; height: 14px;
    border-radius: 2px;
    background: var(--dim);
    border: 1px solid #1c2128;
    cursor: default;
    transition: transform 0.1s;
    position: relative;
  }

  .grid-cell:hover { transform: scale(1.3); z-index: 2; }
  .grid-cell.l1 { background: var(--accent4); }
  .grid-cell.l2 { background: var(--accent3); }
  .grid-cell.l3 { background: var(--accent2); }
  .grid-cell.l4 { background: var(--accent);  }
  .grid-cell.today-cell { outline: 1.5px solid var(--text); outline-offset: 1px; }

  /* per-habit color overrides */
  .habit-grid-block[data-habit="sleep"] .grid-cell.l1 { background: #2d1f6e; }
  .habit-grid-block[data-habit="sleep"] .grid-cell.l2 { background: #4a35a8; }
  .habit-grid-block[data-habit="sleep"] .grid-cell.l3 { background: #6251db; }
  .habit-grid-block[data-habit="sleep"] .grid-cell.l4 { background: #7c6af7; }

  .habit-grid-block[data-habit="workout"] .grid-cell.l1 { background: #431407; }
  .habit-grid-block[data-habit="workout"] .grid-cell.l2 { background: #7c2d12; }
  .habit-grid-block[data-habit="workout"] .grid-cell.l3 { background: #c2410c; }
  .habit-grid-block[data-habit="workout"] .grid-cell.l4 { background: #f97316; }

  .habit-grid-block[data-habit="study"] .grid-cell.l1 { background: #082f49; }
  .habit-grid-block[data-habit="study"] .grid-cell.l2 { background: #0c4a6e; }
  .habit-grid-block[data-habit="study"] .grid-cell.l3 { background: #0369a1; }
  .habit-grid-block[data-habit="study"] .grid-cell.l4 { background: #38bdf8; }

  /* ── LEGEND ── */
  .legend {
    display: flex;
    align-items: center;
    gap: 4px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    margin-top: 8px;
  }

  .legend-cell {
    width: 12px; height: 12px;
    border-radius: 2px;
  }

  /* ── STREAK STATS (stats view) ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }

  .stat-card .s-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  .stat-card .s-value {
    font-size: 28px;
    font-weight: 500;
    color: var(--text);
    font-family: var(--mono);
    line-height: 1;
  }

  .stat-card .s-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 4px;
  }

  .stat-card.green { border-color: var(--accent3); }
  .stat-card.green .s-value { color: var(--accent); }

  .per-habit-stats {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .phs-row {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }

  .phs-dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .phs-name { flex: 1; font-size: 14px; }

  .phs-bar-wrap {
    width: 120px;
    height: 5px;
    background: var(--surface2);
    border-radius: 3px;
    overflow: hidden;
  }

  .phs-bar { height: 100%; border-radius: 3px; }

  .phs-pct {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    width: 38px;
    text-align: right;
  }

  .phs-streak {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent);
    width: 60px;
    text-align: right;
  }
</style>
</head>
<body>

<header>
  <div class="title-block">
    <h1>🏠 Habit Tracker</h1>
    <p id="today-date"></p>
  </div>
  <div class="stat-pills">
    <div class="pill streak-pill">🔥 streak <span class="val" id="header-streak">0</span> days</div>
    <div class="pill">🏆 max <span class="val" id="header-max">0</span></div>
    <div class="pill">✅ today <span class="val" id="header-today">0/4</span></div>
  </div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab('today')">Today</div>
  <div class="tab" onclick="switchTab('weekly')">Weekly</div>
  <div class="tab" onclick="switchTab('monthly')">Monthly</div>
  <div class="tab" onclick="switchTab('stats')">Stats</div>
</div>

<!-- ── TODAY VIEW ── -->
<div class="view active" id="view-today">
  <div class="today-card">
    <div class="today-label">Log today's habits</div>
    <div class="habit-rows" id="habit-rows"></div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progress-label">0 / 4 done</div>
  </div>
</div>

<!-- ── WEEKLY VIEW ── -->
<div class="view" id="view-weekly">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;overflow-x:auto;">
    <table class="week-table" id="week-table"></table>
  </div>
  <div class="legend" style="margin-top:12px;justify-content:flex-start;padding-left:4px;">
    <span style="margin-right:4px">Legend:</span>
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--sleep);margin-right:3px"></span>Sleep
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--coding);margin:0 3px 0 10px"></span>Coding
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--workout);margin:0 3px 0 10px"></span>Workout
    <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:var(--study);margin:0 3px 0 10px"></span>Study
  </div>
</div>

<!-- ── MONTHLY VIEW ── -->
<div class="view" id="view-monthly">
  <div id="monthly-content"></div>
  <div class="legend" style="justify-content:flex-end;padding-right:4px;">
    Less
    <div class="legend-cell" style="background:var(--dim);border:1px solid #1c2128;margin-left:4px"></div>
    <div class="legend-cell l1"></div>
    <div class="legend-cell l2"></div>
    <div class="legend-cell l3"></div>
    <div class="legend-cell l4"></div>
    More
  </div>
</div>

<!-- ── STATS VIEW ── -->
<div class="view" id="view-stats">
  <div class="stats-grid" id="stats-grid"></div>
  <div style="font-family:var(--mono);font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;">Per habit</div>
  <div class="per-habit-stats" id="per-habit-stats"></div>
</div>

<script>
const HABITS = [
  { key: 'sleep',   label: '😴 Sleep',   color: 'var(--sleep)'   },
  { key: 'coding',  label: '💻 Coding',  color: 'var(--coding)'  },
  { key: 'workout', label: '🏋 Workout', color: 'var(--workout)' },
  { key: 'study',   label: '📚 Study',   color: 'var(--study)'   },
];

// ── DATA ──
function todayKey() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getData() {
  try { return JSON.parse(localStorage.getItem('habitData') || '{}'); } catch { return {}; }
}

function setData(d) {
  localStorage.setItem('habitData', JSON.stringify(d));
}



function toggle(habitKey) {
  const data = getData();
  const today = todayKey();
  if (!data[today]) data[today] = {};
  data[today][habitKey] = !data[today][habitKey];
  setData(data);
  renderAll();
}

// ── STATS ──
function calcStreak(habitKey, data) {
  let streak = 0;
  const d = new Date();
  // if today not done, start from yesterday
  const todayDone = data[todayKey()] && data[todayKey()][habitKey];
  if (!todayDone) d.setDate(d.getDate() - 1);
  for (let i = 0; i < 365; i++) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (data[k] && data[k][habitKey]) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function calcMaxStreak(habitKey, data) {
  let max = 0, cur = 0;
  const d = new Date(); d.setDate(d.getDate() - 90);
  for (let i = 0; i < 95; i++) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (data[k] && data[k][habitKey]) { cur++; if (cur > max) max = cur; }
    else cur = 0;
    d.setDate(d.getDate()+1);
  }
  return max;
}

function calcOverallStreak(data) {
  let streak = 0;
  const d = new Date();
  const todayEntry = data[todayKey()];
  const todayFull = todayEntry && HABITS.every(h => todayEntry[h.key]);
  if (!todayFull) d.setDate(d.getDate()-1);
  for (let i = 0; i < 365; i++) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (data[k] && HABITS.every(h => data[k][h.key])) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

function calcOverallMax(data) {
  let max = 0, cur = 0;
  const d = new Date(); d.setDate(d.getDate()-90);
  for (let i = 0; i < 95; i++) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (data[k] && HABITS.every(h => data[k][h.key])) { cur++; if (cur > max) max = cur; }
    else cur = 0;
    d.setDate(d.getDate()+1);
  }
  return max;
}

function completionPct(habitKey, data, days=30) {
  let done = 0;
  const d = new Date();
  for (let i = 0; i < days; i++) {
    const k = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (data[k] && data[k][habitKey]) done++;
    d.setDate(d.getDate()-1);
  }
  return Math.round(done/days*100);
}

// ── RENDER ALL ──
function renderAll() {
  const data = getData();
  const today = todayKey();
  const todayData = data[today] || {};
  const todayDone = HABITS.filter(h => todayData[h.key]).length;

  // Header pills
  document.getElementById('header-streak').textContent = calcOverallStreak(data);
  document.getElementById('header-max').textContent = calcOverallMax(data);
  document.getElementById('header-today').textContent = `${todayDone}/4`;

  // Today label
  const td = new Date();
  document.getElementById('today-date').textContent =
    td.toLocaleDateString('en-IN', { weekday:'long', day:'numeric', month:'long', year:'numeric' });

  renderToday(data, todayData, todayDone);
  renderWeekly(data);
  renderMonthly(data);
  renderStats(data);
}

// ── TODAY ──
function renderToday(data, todayData, todayDone) {
  const rows = document.getElementById('habit-rows');
  rows.innerHTML = '';
  HABITS.forEach(h => {
    const done = !!todayData[h.key];
    const row = document.createElement('div');
    row.className = 'habit-row' + (done ? ' done' : '');
    row.innerHTML = `
      <div class="habit-dot" style="background:${h.color}"></div>
      <div class="habit-name">${h.label}</div>
      <div class="check-box">${done ? '✓' : ''}</div>
    `;
    row.onclick = () => toggle(h.key);
    rows.appendChild(row);
  });
  const pct = todayDone / HABITS.length * 100;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-label').textContent = `${todayDone} / ${HABITS.length} done`;
}

// ── WEEKLY ──
function renderWeekly(data) {
  const table = document.getElementById('week-table');
  const today = new Date();
  const days = [];
  for (let i = 6; i >= 0; i--) {
    const d = new Date(today); d.setDate(today.getDate() - i);
    days.push(d);
  }

  const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  let html = `<thead><tr>
    <th style="text-align:left">Day</th>
    ${HABITS.map(h=>`<th>${h.label}</th>`).join('')}
    <th>Done</th>
  </tr></thead><tbody>`;

  days.forEach(d => {
    const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const entry = data[key] || {};
    const isToday = key === todayKey();
    const done = HABITS.filter(h => entry[h.key]).length;
    html += `<tr class="${isToday ? 'today-row' : ''}">
      <td class="day-label">${dayNames[d.getDay()]} ${d.getDate()}</td>
      ${HABITS.map(h => {
        const isDone = !!entry[h.key];
        return `<td><div class="cell-dot ${isDone ? 'done-'+h.key : ''}"></div></td>`;
      }).join('')}
      <td style="font-family:var(--mono);font-size:12px;color:${done===4?'var(--accent)':done>0?'var(--muted)':'#333'}">${done}/4</td>
    </tr>`;
  });

  html += '</tbody>';
  table.innerHTML = html;
}

// ── MONTHLY ──
function renderMonthly(data) {
  const container = document.getElementById('monthly-content');
  container.innerHTML = '';
  const today = new Date();

  HABITS.forEach(h => {
    const block = document.createElement('div');
    block.className = 'habit-grid-block';
    block.dataset.habit = h.key;

    const streak = calcStreak(h.key, data);
    block.innerHTML = `
      <div class="habit-grid-header">
        <div class="habit-dot" style="background:${h.color}"></div>
        <span class="habit-grid-name">${h.label}</span>
        <span style="font-family:var(--mono);font-size:11px;color:var(--accent);margin-left:auto">🔥 ${streak} day streak</span>
      </div>
      <div class="grid-row" id="grid-${h.key}"></div>
    `;
    container.appendChild(block);

    const gridEl = block.querySelector(`#grid-${h.key}`);
    // show last 84 days (12 weeks)
    for (let i = 83; i >= 0; i--) {
      const d = new Date(today); d.setDate(today.getDate() - i);
      const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const done = data[key] && data[key][h.key];
      const isToday = key === todayKey();
      const cell = document.createElement('div');
      cell.className = 'grid-cell' + (done ? ' l4' : '') + (isToday ? ' today-cell' : '');
      cell.title = `${d.toLocaleDateString('en-IN',{day:'numeric',month:'short'})}: ${done ? '✓ done' : '✗ missed'}`;
      gridEl.appendChild(cell);
    }
  });
}

// ── STATS ──
function renderStats(data) {
  const streak = calcOverallStreak(data);
  const maxStreak = calcOverallMax(data);
  const pct30 = HABITS.reduce((sum,h) => sum + completionPct(h.key,data,30), 0) / HABITS.length;
  const pct7  = HABITS.reduce((sum,h) => sum + completionPct(h.key,data,7),  0) / HABITS.length;

  document.getElementById('stats-grid').innerHTML = `
    <div class="stat-card green">
      <div class="s-label">Current streak</div>
      <div class="s-value">${streak}</div>
      <div class="s-sub">perfect days in a row</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Max streak (90d)</div>
      <div class="s-value">${maxStreak}</div>
      <div class="s-sub">all 4 habits done</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Avg completion (7d)</div>
      <div class="s-value">${Math.round(pct7)}%</div>
      <div class="s-sub">this week</div>
    </div>
    <div class="stat-card">
      <div class="s-label">Avg completion (30d)</div>
      <div class="s-value">${Math.round(pct30)}%</div>
      <div class="s-sub">this month</div>
    </div>
  `;

  const phsEl = document.getElementById('per-habit-stats');
  phsEl.innerHTML = '';
  HABITS.forEach(h => {
    const pct = completionPct(h.key, data, 30);
    const s   = calcStreak(h.key, data);
    const row = document.createElement('div');
    row.className = 'phs-row';
    row.innerHTML = `
      <div class="phs-dot" style="background:${h.color}"></div>
      <div class="phs-name">${h.label}</div>
      <div class="phs-bar-wrap"><div class="phs-bar" style="width:${pct}%;background:${h.color}"></div></div>
      <div class="phs-pct">${pct}%</div>
      <div class="phs-streak">🔥 ${s}d</div>
    `;
    phsEl.appendChild(row);
  });
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('view-'+name).classList.add('active');
}

// Init
renderAll();
</script>
